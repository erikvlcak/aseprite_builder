name: Build and deploy Aseprite

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Build even if this version was already built'
        type: boolean
        default: false

env:
  BUILD_TYPE: Release
  SKIA_VERSION: m124-08a5439a6b

permissions:
  contents: write

jobs:
  check-version:
    name: Check latest Aseprite release
    runs-on: ubuntu-latest
    outputs:
      download_url: ${{ steps.version_info.outputs.download_url }}
      latest_tag: ${{ steps.version_info.outputs.latest_tag }}
      should_build: ${{ steps.should_build.outputs.should_build }}
    steps:
    - name: Get latest version info
      id: version_info
      run: |
        data=$(curl -sL https://api.github.com/repos/aseprite/aseprite/releases/latest)
        LATEST_TAG=$(echo "${data}" | jq -r '.tag_name')
        DOWNLOAD_URL=$(echo "${data}" | jq -r '.assets[] | select(.name | endswith("-Source.zip")) | .browser_download_url')
        VERSION_INFO=$(echo "${data}" | jq -r '.body')

        echo "${LATEST_TAG}" > ${LATEST_TAG}.txt
        echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
        echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
        {
          echo "version_info<<EOF"
          echo "${VERSION_INFO}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
    - name: Load version from cache
      id: version_check
      uses: actions/cache@v4
      with:
        path: ${{ steps.version_info.outputs.latest_tag }}.txt
        key: cached_version_${{ steps.version_info.outputs.latest_tag }}
    - name: Should we start new build?
      id: should_build
      if: steps.version_check.outputs.cache-hit != 'true' || github.event.inputs.force_build == 'true'
      run: echo "should_build=true" >> "$GITHUB_OUTPUT"
    - name: Create draft release
      if: steps.should_build.outputs.should_build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
        TAG: ${{ steps.version_info.outputs.latest_tag }}
        NOTES: ${{ steps.version_info.outputs.version_info }}
      run: |
        if ! gh release view "$TAG" >/dev/null 2>&1; then
          gh release create "$TAG" \
            --draft \
            --title "Release Aseprite $TAG" \
            --notes "$NOTES"
        fi

  build-aseprite:
    name: Build Aseprite
    needs: check-version
    if: ${{ needs.check-version.outputs.should_build }}
    runs-on: ${{ matrix.os }}
    strategy:
       matrix:
         os: [macOS-latest]
       fail-fast: false
    steps:
      - name: Install dependencies
        run: brew install ninja p7zip

      - name: Get Skia from cache
        id: skia-cache
        uses: actions/cache@v4
        with:
          path: skia
          key: skia-${{ matrix.os }}-${{ env.SKIA_VERSION }}

      - name: Download Skia if not in cache
        if: steps.skia-cache.outputs.cache-hit != 'true'
        run: |
          curl -o Skia-macOS-Release-arm64.zip -L \
            https://github.com/aseprite/skia/releases/download/${{ env.SKIA_VERSION }}/Skia-macOS-Release-arm64.zip
          unzip Skia-macOS-Release-arm64.zip -d skia

      - name: Download Aseprite release
        run: |
          curl -o Aseprite-source.zip -L "${{ needs.check-version.outputs.download_url }}"
          unzip Aseprite-source.zip -d aseprite
          mkdir -p aseprite/build

      - name: Run CMake
        working-directory: aseprite/build
        run: |
          SKIA_ROOT="${GITHUB_WORKSPACE}/skia"
          cmake \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk macosx --show-sdk-path) \
            -DLAF_BACKEND=skia \
            -DSKIA_DIR="${SKIA_ROOT}" \
            -DSKIA_LIBRARY_DIR="${SKIA_ROOT}/out/Release-arm64" \
            -DSKIA_LIBRARY="${SKIA_ROOT}/out/Release-arm64/libskia.a" \
            -G Ninja \
            ..

      - name: Run Ninja
        working-directory: aseprite/build
        run: ninja aseprite

      - name: Clean up build
        working-directory: aseprite/build/bin
        run: rm -f gen modp_b64_gen

      - name: Create release zip
        working-directory: aseprite/build/bin
        run: 7z -tzip a Aseprite-${{ needs.check-version.outputs.latest_tag }}-macOS.zip *

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.check-version.outputs.latest_tag }}
        working-directory: aseprite/build/bin
        run: |
          gh release upload "$TAG" \
            "Aseprite-${TAG}-macOS.zip" \
            --clobber
